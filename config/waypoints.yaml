waypoints:
  # ── Hallway / Reception  (y: 0 → 3.5) ────────────────────────────────────
  #    Robot spawns here and navigates outward.
  home:             {x:  1.0, y:  1.5, yaw: 0.0}
  charging_dock:    {x:  0.5, y:  0.5, yaw: 3.14}
  hall_wa:          {x:  3.0, y:  1.5, yaw: 0.0}   # junction near door A
  hall_mid:         {x:  6.0, y:  1.5, yaw: 0.0}   # hallway midpoint
  hall_wb:          {x:  9.0, y:  1.5, yaw: 0.0}   # junction near door B
  nurses_station:   {x: 11.0, y:  1.5, yaw: 1.57}

  # ── Ward A transitions  (door A gap: x 2.0→4.0 at y=3.5) ─────────────────
  #    Approach straight through x=3.0 (inside door gap).
  ward_a_south:     {x:  3.0, y:  2.8, yaw: 1.57}  # in hallway approaching door
  ward_a_north:     {x:  3.0, y:  4.5, yaw: 1.57}  # just inside Ward A
  ward_a_aisle:     {x:  2.0, y:  4.5, yaw: 1.57}  # step west to robot aisle

  # ── Ward A beds  (frames at x=4.5, robot parks at x=2.0) ─────────────────
  bed_1:            {x:  2.0, y:  5.0, yaw: 0.0}
  bed_2:            {x:  2.0, y:  7.5, yaw: 0.0}
  bed_3:            {x:  2.0, y:  9.5, yaw: 0.0}

  # ── Ward B transitions  (door B gap: x 8.0→10.0 at y=3.5) ────────────────
  ward_b_south:     {x:  9.0, y:  2.8, yaw: 1.57}
  ward_b_north:     {x:  9.0, y:  4.5, yaw: 1.57}
  ward_b_aisle:     {x:  8.5, y:  4.5, yaw: 1.57}  # step west to robot aisle

  # ── Ward B beds  (frames at x=11.0, robot parks at x=8.5) ────────────────
  bed_4:            {x:  8.5, y:  5.0, yaw: 0.0}
  bed_5:            {x:  8.5, y:  7.5, yaw: 0.0}
  bed_6:            {x:  8.5, y:  9.5, yaw: 0.0}
