/**:
  ros__parameters:
    # MQTT Broker Configuration
    mqtt_broker_host: 'localhost'
    mqtt_broker_port: 1883
    mqtt_client_id: 'ros2_pi5_bridge'
    mqtt_keepalive: 60

    # Feature Enablement
    enable_sensors: true       # Enable sensor topic bridges
    enable_commands: true      # Enable command topic bridges
    enable_feedback: true      # Enable feedback topic bridges

    # Monitoring
    stats_log_interval: 30.0   # Log statistics every 30 seconds
